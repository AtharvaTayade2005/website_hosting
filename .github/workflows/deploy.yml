name: Deploy Static Website to GCS

on:
  push:
    branches:
      - main  # Triggers when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    - name: Upload files to GCS Bucket
      run: |
        gsutil cp index.html gs://website_hosting_gcs/
        gsutil cp about.html gs://Ywebsite_hosting_gcs/
        gsutil cp style.css gs://website_hosting_gcs/